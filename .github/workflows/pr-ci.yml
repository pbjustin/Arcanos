name: PR CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Setup Python for transport-matrix tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal Python protocol runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema referencing

      - name: Boundary checks
        run: |
          npm run check:boundaries
          npm run check:cef-layer-access

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

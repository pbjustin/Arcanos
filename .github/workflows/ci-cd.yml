# Authoritative required workflow for branch protection checks.
name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '20.19.0'
  OPENAI_API_KEY: 'mock-api-key'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🛡️ Commit guardrails
        run: npm run guard:commit

      - name: 🧾 Validate backend/CLI contract manifest
        run: npm run validate:backend-cli:contract

      - name: 🧱 Enforce CEF boundaries
        run: |
          npm run check:boundaries
          npm run check:cef-layer-access

      - name: 🔧 Type check
        run: npm run type-check

      - name: 🧹 Lint code
        run: npm run lint

  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]

    strategy:
      matrix:
        node-version: ['20.19.0']

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build project
        run: npm run build

      - name: 📊 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 1

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    
    strategy:
      matrix:
        test-type: [unit, integration]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🐍 Setup Python for transport-matrix tests
        if: matrix.test-type == 'unit'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install minimal Python protocol runtime dependencies
        if: matrix.test-type == 'unit'
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade "jsonschema>=4.23.0,<5" "referencing>=0.35.1,<1"

      - name: 🔨 Build project
        run: npm run build

      - name: 🧪 Run unit tests
        if: matrix.test-type == 'unit'
        run: npm test

      - name: 📊 Upload Node coverage to Codecov
        if: matrix.test-type == 'unit'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: node
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: 🔌 Run integration tests
        if: matrix.test-type == 'integration'
        run: |
          # Set minimal environment for testing
          export OPENAI_API_KEY=mock-api-key
          export NODE_ENV=test
          export PORT=0
          npm run test:integration

  validate-railway-compatibility:
    name: Railway Compatibility
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build project
        run: npm run build

      - name: 🚄 Validate Railway compatibility
        run: npm run validate:railway

      - name: 🐳 Test Docker build
        run: |
          docker build -t arcanos-test .
          echo "✅ Docker build successful"

  validate-deployment-readiness:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [build, test, validate-railway-compatibility]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: 🔨 Restore workspace package builds
        run: npm run build:packages

      - name: 🚀 Test server startup
        run: |
          export NODE_ENV=production
          export PORT=8080
          export OPENAI_API_KEY=mock-api-key
          export ARCANOS_GPT_ACCESS_TOKEN=ci-gpt-access-token-for-local-workflow-only
          export ARCANOS_GPT_ACCESS_BASE_URL=http://localhost:8080
          export ARCANOS_GPT_ACCESS_SCOPES=runtime.read,workers.read,queue.read,jobs.create,jobs.result,logs.read_sanitized,db.explain_approved,mcp.approved_readonly,diagnostics.read
          timeout 30s npm start &
          SERVER_PID=$!
          
          # Wait for server to start
          sleep 10
          
          # Test health endpoint
          curl -f http://localhost:8080/health || exit 1
          
          # Kill server
          kill $SERVER_PID || true
          
          echo "✅ Server starts successfully and responds to health checks"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔒 Run npm security audit
        run: |
          # GHSA-r5fr-rjxr-66jc and GHSA-f23m-r3pf-42rh are currently reported
          # against transitive `lodash` via `knex`, and GHSA-r4q5-vmmm-2653 is
          # currently reported against transitive `follow-redirects` via `axios`,
          # but no remediated npm release is available yet on the published
          # dependency lines. GHSA-8r9q-7v3j-jr4g and GHSA-345p-7cg4-v4c7 are
          # reported against the MCP SDK, but this service does not expose MCP
          # resource templates and it builds a fresh HTTP server/transport pair
          # per request, so those code paths are not in use here.
          # GHSA-w5hq-g745-h8pq is currently reported against `uuid` and
          # transitive `uuid` via `bullmq`; the audit-reported fixed uuid@14.0.0
          # is not published, this service does not call uuid directly, and
          # BullMQ's bundled usage is limited to v4() queue/worker ids. Keep the
          # audit active while suppressing only these known upstream/inapplicable
          # advisories so CI still fails on any newly actionable production
          # vulnerability.
          npm audit --omit=dev --json > npm-audit.json || true
          node scripts/check-npm-audit.js npm-audit.json

      - name: 📜 License compliance check
        run: npx license-checker --production --failOn "GPL-3.0;AGPL-3.0"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔒 Run Python dependency audit
        run: |
          pip install pip-audit
          # CVE-2026-4539 is currently reported against transitive `pygments` with no
          # published fix version. Keep the audit active while suppressing only this
          # unfixed advisory so CI still catches newly remediable issues.
          pip-audit --ignore-vuln CVE-2026-4539 -r daemon-python/requirements.txt

  sdk-compliance-audit:
    name: Convergence Gate
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build project
        run: npm run build

      - name: ♻️ Run convergence gate
        run: npm run converge:ci

      - name: 📊 Upload convergence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: converge-artifacts
          path: converge-artifacts/
          if-no-files-found: ignore
          retention-days: 30

  python-cli-windows:
    name: Python CLI (Windows)
    runs-on: windows-latest
    needs: [lint-and-typecheck]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install openai requests python-dotenv tenacity sentry-sdk pytest pytest-mock rich "jsonschema>=4.23.0,<5" "referencing>=0.35.1,<1"

      - name: 🧪 Validate CLI offline contract
        run: python daemon-python/validate_backend_cli_offline.py

      - name: 🧪 Run Python unit tests with coverage
        run: |
          pip install pytest-cov
          pytest daemon-python/tests/ -q --cov=daemon-python/arcanos --cov-report=xml:coverage-python.xml

      - name: 📊 Skip Python Codecov upload
        run: echo "Python coverage is outside the current reported Codecov project scope."

  all-checks-complete:
    name: All Checks Complete
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, test, validate-railway-compatibility, validate-deployment-readiness, security-audit, sdk-compliance-audit, python-cli-windows]
    
    steps:
      - name: ✅ All checks passed
        run: |
          echo "🎉 All CI/CD checks have passed successfully!"
          echo "✅ Linting and type checking"
          echo "✅ Build process"
          echo "✅ Test suite"
          echo "✅ Railway compatibility"
          echo "✅ Deployment readiness"
          echo "✅ Security audit"
          echo "✅ Convergence gate"
          echo ""
          echo "🚀 Repository is ready for production deployment!"
